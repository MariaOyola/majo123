version: "3.8"

services:

  db:
    image: postgres:15
    container_name: postgres_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: db_liquibase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 12345
    ports:
      - "5437:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d db_liquibase"]
      interval: 5s
      timeout: 5s
      retries: 10

  liquibase:
    image: liquibase/liquibase:4.27
    container_name: liquibase_runner
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./liquibase:/liquibase/changelog
      - ./liquibase/drivers/postgresql-42.7.10.jar:/liquibase/lib/postgresql-42.7.10.jar
    working_dir: /liquibase/changelog
    command: >
      --defaultsFile=/liquibase/changelog/liquibase.properties
      update

volumes:
  postgres_data: